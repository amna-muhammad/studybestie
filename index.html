<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBestie Login</title>

  <!-- redirect to dashboard when already logged in -->
  <script>
    if (localStorage.getItem("studyBestie_session")) {
      window.location.href = "dashboard.html";
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Indie+Flower&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Quicksand',sans-serif;
      background:#fff5f8;
      background-image:
        radial-gradient(#ffafcc 0.8px,transparent 0.8px),
        radial-gradient(#a2d2ff 0.8px,#fff5f8 0.8px);
      background-size:24px 24px;
      background-position:0 0,12px 12px;
    }

    .glass{
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(10px);
      border:3px solid white;
      border-radius:30px;
      box-shadow:0 10px 25px rgba(255,175,204,0.2);
    }

    .btn-cute{
      background:#ffafcc;
      color:white;
      border-bottom:5px solid rgba(0,0,0,0.1);
      transition:all .2s;
    }

    .btn-cute:hover{ transform:translateY(-2px); }
    .btn-cute:active{ transform:translateY(2px); border-bottom-width:2px; }

    .btn-blue{
      background:#a2d2ff;
      color:white;
      border-bottom:5px solid rgba(0,0,0,0.08);
      transition:all .2s;
    }

    .btn-blue:hover{ transform:translateY(-2px); }
    .btn-blue:active{ transform:translateY(2px); border-bottom-width:2px; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

  <div class="glass w-full max-w-md p-10">

    <div class="text-center mb-8">
      <div class="text-5xl mb-2">🎀</div>
      <h1 class="text-3xl font-black text-pink-400">StudyBestie</h1>
      <p class="text-sm text-blue-400 font-semibold">Your cute study companion ✨</p>
    </div>

    <!-- popup -->
    <div id="authPopup" class="hidden mb-4 p-4 rounded-2xl border-2 font-bold text-sm transition">
      <div id="authPopupTitle" class="text-base"></div>
      <div id="authPopupText" class="mt-1"></div>
    </div>

    <div class="space-y-4">
      <input
        id="email"
        type="text"
        placeholder="Email or Phone"
        class="w-full p-4 rounded-2xl border-2 border-pink-100 bg-white focus:outline-none focus:border-pink-300 font-semibold"
        autocomplete="username"
      />

      <div class="relative">
        <input
          id="password"
          type="password"
          placeholder="Password (8+ chars + 1 special)"
          class="w-full p-4 pr-16 rounded-2xl border-2 border-pink-100 bg-white focus:outline-none focus:border-pink-300 font-semibold"
          autocomplete="current-password"
        />
        <button
          type="button"
          id="togglePw"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-black text-blue-400 bg-white/70 border border-blue-200 px-3 py-1 rounded-full hover:scale-105 transition"
        >
          SHOW
        </button>
      </div>

      <div class="flex items-center justify-between text-xs font-bold text-gray-500">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input id="rememberMe" type="checkbox" class="accent-pink-400">
          Remember me
        </label>

        <button
          type="button"
          onclick="openReset()"
          class="underline text-blue-400 hover:text-blue-500"
        >
          Forgot password?
        </button>
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button
        id="loginBtn"
        onclick="handleLogin()"
        class="flex-1 py-4 rounded-2xl font-bold btn-cute"
      >
        Login 💖
      </button>

      <button
        onclick="window.location.href='create-account.html'"
        class="flex-1 py-4 rounded-2xl font-bold btn-blue"
      >
        Create ✨
      </button>
    </div>

    <p class="text-xs text-center text-gray-400 mt-6 leading-relaxed">
      Welcome back to StudyBestie.
    </p>

  </div>

  <div id="resetModal" class="hidden fixed inset-0 z-50 bg-black/35 flex items-center justify-center p-4">
    <div class="glass w-full max-w-md p-6">
      <h2 class="text-2xl font-black text-pink-400">Reset Password</h2>
      <p class="text-xs font-bold text-gray-500 mt-1">Use your email or phone to set a new password.</p>

      <form id="resetForm" class="mt-4 space-y-3">
        <input
          id="resetKey"
          type="text"
          placeholder="Email or Phone"
          class="w-full p-3 rounded-2xl border-2 border-pink-100 bg-white focus:outline-none focus:border-pink-300 font-semibold"
        />
        <input
          id="resetPassword"
          type="password"
          placeholder="New password (8+ chars + 1 special)"
          class="w-full p-3 rounded-2xl border-2 border-pink-100 bg-white focus:outline-none focus:border-pink-300 font-semibold"
        />

        <div class="flex gap-2 pt-1">
          <button type="submit" class="flex-1 py-3 rounded-2xl font-bold btn-cute">Update Password</button>
          <button type="button" onclick="closeReset()" class="flex-1 py-3 rounded-2xl font-bold btn-blue">Cancel</button>
        </div>
      </form>

      <button
        type="button"
        onclick="wipeLocalData()"
        class="mt-4 w-full py-2 rounded-xl border-2 border-pink-200 text-pink-500 font-bold text-xs hover:bg-pink-50 transition"
      >
        Clear all local app data
      </button>
    </div>
  </div>

  <script src="js/auth.js"></script>

  <script>
    let popupTimer = null;

    function showAuthPopup(title, msg){
      const box = document.getElementById('authPopup');
      document.getElementById('authPopupTitle').textContent = title;
      document.getElementById('authPopupText').textContent = msg;
      box.className = 'mb-4 p-4 rounded-2xl border-2 font-bold text-sm transition bg-pink-50 border-pink-200 text-pink-600';
      box.classList.remove('hidden');
      clearTimeout(popupTimer);
      popupTimer = setTimeout(() => box.classList.add('hidden'), 3200);
    }

    function openReset(){
      const remembered = document.getElementById('email').value.trim();
      document.getElementById('resetKey').value = remembered;
      document.getElementById('resetPassword').value = '';
      document.getElementById('resetModal').classList.remove('hidden');
    }

    function closeReset(){
      document.getElementById('resetModal').classList.add('hidden');
    }

    function passwordStrongEnough(pw){
      if (!pw || pw.length < 8) return false;
      const special = /[!@#$%^&*()_\-+=\[\]{};:'",.<>\/?\\|`~]/;
      return special.test(pw);
    }

    function normalizeKey(v){
      const value = (v || '').trim();
      if (value.includes('@')) return value.toLowerCase();
      return value.replace(/\D/g, '');
    }

    function resetPasswordFromModal(){
      const keyRaw = document.getElementById('resetKey').value.trim();
      const newPassword = document.getElementById('resetPassword').value;

      if (!keyRaw || !newPassword){
        showAuthPopup('Missing details', 'Enter your email/phone and new password.');
        return;
      }

      if (!passwordStrongEnough(newPassword)){
        showAuthPopup('Invalid password', 'Password must be 8+ characters and include at least 1 special character.');
        return;
      }

      const key = normalizeKey(keyRaw);
      const accounts = JSON.parse(localStorage.getItem('studyBestie_accounts') || '[]');
      const userIndex = accounts.findIndex(a =>
        (a.email && normalizeKey(a.email) === key) || (a.phone && normalizeKey(a.phone) === key)
      );

      if (userIndex === -1){
        showAuthPopup('Account not found', 'No account matches that email/phone.');
        return;
      }

      accounts[userIndex].password = newPassword;
      localStorage.setItem('studyBestie_accounts', JSON.stringify(accounts));
      closeReset();
      showAuthPopup('Password updated', 'Your password was reset successfully. You can log in now.');
    }

    function wipeLocalData(){
      localStorage.clear();
      closeReset();
      showAuthPopup('Local data cleared', 'All local StudyBestie data on this browser was removed.');
      setTimeout(() => location.reload(), 700);
    }

    // show/hide password
    document.getElementById('togglePw').addEventListener('click', () => {
      const input = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? 'HIDE' : 'SHOW';
    });

    // remember me
    const remembered = localStorage.getItem('studyBestie_lastLogin');
    if (remembered) {
      document.getElementById('email').value = remembered;
      document.getElementById('rememberMe').checked = true;
    }

    // enter key = login
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('resetModal').classList.contains('hidden')) return;
      if (e.key === 'Enter') handleLogin();
    });

    document.getElementById('resetForm').addEventListener('submit', (e) => {
      e.preventDefault();
      resetPasswordFromModal();
    });

    function validateLoginKey(input){
      if (input.includes('@')){
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!re.test(input)){
          showAuthPopup('Invalid email', 'Please enter a valid email address.');
          return false;
        }
      } else {
        const digits = input.replace(/\D/g,'');
        if (digits.length < 10){
          showAuthPopup('Invalid phone', 'Please enter a valid phone number.');
          return false;
        }
      }
      return true;
    }

    function handleLogin(){
      const emailOrPhone = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!emailOrPhone || !password){
        showAuthPopup('Missing details', 'Please enter your email/phone and password.');
        return;
      }

      if (!validateLoginKey(emailOrPhone)){
        return; // message shown inside validator
      }

      // remember user
      if (document.getElementById('rememberMe').checked){
        localStorage.setItem('studyBestie_lastLogin', emailOrPhone);
      } else {
        localStorage.removeItem('studyBestie_lastLogin');
      }

      // call your auth.js login()
      try {
        login();
      } catch (err) {
        showAuthPopup('Login error', 'Login failed because auth.js did not load. Check js/auth.js path.');
      }
    }

    window.showAuthPopup = showAuthPopup;
  </script>

</body>
</html>
